<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Share - Quick text handoff between devices</title>
    <meta
      name="description"
      content="A tiny offline-friendly PWA for sharing short text and links between nearby devices using QR codes."
    />
    <meta name="theme-color" content="#0f172a" />
    <meta
      property="og:title"
      content="QR Share - Quick text handoff between devices"
    />
    <meta
      property="og:description"
      content="A tiny offline-friendly PWA for sharing short text and links between nearby devices using QR codes."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://jacksoncurrie.github.io/qrshare/"
    />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="QR Share - Quick text handoff between devices"
    />
    <meta
      name="twitter:description"
      content="A tiny offline-friendly PWA for sharing short text and links between nearby devices using QR codes."
    />
    <link rel="canonical" href="https://jacksoncurrie.github.io/qrshare/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      ;(() => {
        const storedTheme = window.localStorage.getItem('qr-share-theme')
        const prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches
        const theme =
          storedTheme === 'light' || storedTheme === 'dark'
            ? storedTheme
            : prefersDark
              ? 'dark'
              : 'light'

        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
